  date: '2019-03-31'
  url: https://corecursive.com/028-data-and-scale-with-pat-helland/
  slug: 028-data-and-scale-with-pat-helland
  description: Pat Helland has a wealth of knowledge on building distributed data stores. He has been working on distributed data stores since 1978, when he worked on the tandem fault-tolerant database.
    Since then he has been involved in many distributed database projects. Here is the key thing, he is also a master at explaining the key ideas of distributed systems using simple language and practical
    everyday examples. Can you get married on the phone? How are messaging systems and idempotence like regional offices communicating via fax machine? These are the type of metaphor that Pat uses. Today,
