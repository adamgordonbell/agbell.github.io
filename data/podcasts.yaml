  title: The Little Typer
  date: '2018-12-01'
  url: https://corecursive.com/023-little-typer-and-pie-language/
  slug: 023-little-typer-and-pie-language
  description: 'You can write more correct software and even rigorous mathematical proofs. Prepare for some mind stretching. Previous guests like Edwin Brady and Stephanie Weirich have discussed some of
    the exciting things a dependent type system can do Miles Sabin said dependent types are surely the future. This interview is to get us ready for the future. Daniel P. Friedman is famous for his "Little"
    series of books. Little Schemer, Little prover, Little MLer and so on. These books are held in high regard. Here is a quote from Doug Crockford: _"Little Schemer teaches one thing, a thing that is very
    difficult to teach, a thing that every profession programmer should know, and it does it really well. These are lessons that stick with you."_ The latest one is the little typer and its about types.
    Specifically dependent types. Dan''s coauthor is David Thrane Christiansen, Idris contributor, and host of a podcast about type theory that is way over my head. Together they are going to teach us how
    the programming skills we already have can be used to develop rigorous mathematical proofs. Stay tuned to the end for my guide to working thru the book.'
  source: corecursive
