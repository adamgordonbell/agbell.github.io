  title: Big Ball Of Mud
  date: '2018-11-14'
  url: https://corecursive.com/22-big-ball-of-mud-architecture-and-services-with-wade-waldron/
  slug: 22-big-ball-of-mud-architecture-and-services-with-wade-waldron
  description: 'In 1997, researchers analyzed the actual architectures of software in the field. The horrifying results: a large portion were best described by colorful phrases like "big ball of mud" and
    "sweep it under the rug." Wade Waldron talks about designing reactive applications and systems and how to avoid these anti-patterns. We also cover when a monolith is the right choice, hexagonal architecture,
    what to do if you''re stuck with a big ball of mud and more.'
  source: corecursive
- type: podcast
  role: host
  title: Concurrency and Functional Programming
  date: '2018-10-03'
  url: https://corecursive.com/020-concurrency-and-fp-with-riccardo-terrell/
  slug: 020-concurrency-and-fp-with-riccardo-terrell
  description: When Riccardo Terrell hit the concurrency limitations in a jvm application, he thought back to the haskell he learned in a university course and decided to rewrite the entire thing in haskell.
    The immutability of the haskell solution made the concurrency bottleneck non-existent. It is no surprise that years later, his book on concurrency in .net leans heavily on functional programming constructs
    and the functional features of F# and C#. Today we talk about concurrency and functional programming, about F# how it compares to haskell and scala. We also chat about CPU architectures, best practises
    for writing distributed systems and much more. Thanks to Manning we also have some free copies of the book to give away. Leave a comment on the webpage for the episode or on twitter if you are interested
    and I will randomly pick from the interested parties.
  source: corecursive
- type: podcast
  role: host
  title: Test in Production
  date: '2018-08-31'
  url: https://corecursive.com/019-test-in-production-with-charity-majors/
  slug: 019-test-in-production-with-charity-majors
  description: Today's Interview is with Charity Majors. We talk about how to make it easier to debug production issues in today's world of complicated distributed systems. A warning, There is some explicit
    language in this interview. I originally saw a talk by Charity where she said something like fuck your metrics and dashboards, you should test in production more. It was a pretty hyperbolic statement,
    but backed up with a lot of great insights. I think you'll find this interview similarly insightful. Charity and her company are probably best known for popularizing the concept that observability in
    the key to being able to debug issues in production.
  source: corecursive
- type: podcast
  role: host
  title: Domain Driven Design and Micro Services
  date: '2018-08-17'
  url: https://corecursive.com/018-micro-services-and-domain-driven-design-with-vaughn-vernon/
  slug: 018-micro-services-and-domain-driven-design-with-vaughn-vernon
  description: Today I talk to Vaughn Vernon about how Domain Driven Design can help with designing micro services. The guidelines that Vaughn has developed in his work on DDD can provide guidance for where
    service and consistency boundaries should be drawn. We also talk about the platform he is developing for applying these DDD concepts using the actor model, [Vlingo](https://vlingo.io).
  source: corecursive
- type: podcast
  role: host
  title: Typeful Functional Streaming HTTP
  date: '2018-07-27'
  url: https://corecursive.com/017-http4s-with-ross-baker/
  slug: 017-http4s-with-ross-baker
  description: The promise of functional programming is code that is easier to reason about, test and maintain. Referential transparency means there is no extra context to worry about, we can just focus
    on inputs and outputs. Examples of functional programming in the small are plentiful. Fibonacci is easy to write as a function but what about fp in the large? Http4s is a web framework written in scala
    that takes a pure functional approach to building http services. Ross Baker is a contributor to http4s and he explains the benefits of this approach. We also touch on the benefits of working remotely,
    since he and I have both been doing it for some time.
  source: corecursive
- type: podcast
  role: host
  title: Moves and Borrowing In Rust
  date: '2018-07-03'
  url: https://corecursive.com/016-moves-and-borrowing-in-rust-with-jim-blandy/
  slug: 016-moves-and-borrowing-in-rust-with-jim-blandy
  description: The surprising thing about rust is how memory management works. Rust has the concepts of moves and borrowing. If you have heard about Rust, you may have heard people talking about the borrow
    checker and trying to make it happy. In this interview, Jim Blandy walks us through what these concepts mean and how they work. We also talk about how to avoid fighting with the borrow checker at all
    and why the conceptual model that Rust adopts, though it may seem unusual at first, is actually more representative of how computers work and therefore an easier programming model.
  source: corecursive
- type: podcast
  role: host
  title: Dependent Types in Haskell
  date: '2018-06-13'
  url: https://corecursive.com/015-dependant-types-in-haskell-with-stephanie-weirich/
  slug: 015-dependant-types-in-haskell-with-stephanie-weirich
  description: At Strange Loop 2017, I wandered into a talk where I saw some code that deeply surprised me. The code could have been python if you squinted, passing dictionaries around, no type annotations
    anywhere. Yet, key lookup in the dictionary was validated at compile time. It was a compile-time error to access elements that didn't exist. Also, the dictionary was heterogeneous, the elements had
    different types, and it was all inferred and validated at compile time. What I was seeing was Dependent types in Haskell. In today's interview, Stephanie Weirich explains her efforts to add dependent
    types to Haskell and how that example worked. At Strange Loop 2017, I wandered into a talk where I saw some code that deeply surprised me. The code could have been python if you squinted, passing dictionaries
    around, no type annotations anywhere. Yet, key lookup in the dictionary was validated at compile time. It was a compile-time error to access elements that didn’t exist. Also, the dictionary was heterogeneous,
    the elements had different types, and it was all inferred and validated at compile time. What I was seeing was Dependent types in Haskell. In today’s interview, Stephanie Weirich explains her efforts
    to add dependent types to Haskell and how that example worked.
  source: corecursive
- type: podcast
  role: host
  title: Microservices Architecture
  date: '2018-06-06'
  url: https://corecursive.com/014-micro-service-architectures-with-jan-machacek/
  slug: 014-micro-service-architectures-with-jan-machacek
  description: 'I don''t know a lot about microservices. Like how to design them and what the various caveats and anti-patterns are. I''m currently working on a project that involves decomposing a monolithic
    application into separate parts, integrated together using Kafka and http. Today I talk to coauthor of upcoming book, Reactive Systems Architecture : Designing and Implementing an Entire Distributed
    System. If you want to learn some of the hows and whys of building a distributed system, I think you''ll really enjoy this interview. The insights from this conversation are already helping me.'
  source: corecursive
- type: podcast
  role: host
  title: Rust And Bitter C++ Developers
  date: '2018-05-16'
  url: https://corecursive.com/013-rust-and-bitter-c-developers-with-jim-blandy/
  slug: 013-rust-and-bitter-c-developers-with-jim-blandy
  description: Today I talk with Jim Blandy, one of the authors of Programming Rust. We talk about what problems rust is trying to solve, the unique language features and type system of rust. It includes
    both algebraic data types, type classes, and generics. We also touch on why it is so hard to secure code. Jim works on Firefox and his insights into the difficulty of writing secure code are super interesting.
  source: corecursive
- type: podcast
  role: host
  title: Distributed Systems
  date: '2018-05-02'
  url: https://corecursive.com/012-erlang-and-distributed-systems-with-steven-proctor/
  slug: 012-erlang-and-distributed-systems-with-steven-proctor
  description: Today's interview is with Steven Proctor, the host of the functional geekery podcast. We talk about distributed programming in general and specifically how erlang supports distributed computing.
    We also talk about things he's learned about functional programming and applying FP principles to various non FP contexts.
  source: corecursive
- type: podcast
  role: host
  title: Graphql
  date: '2018-04-18'
  url: https://corecursive.com/011-graphql-and-sangria-with-oleg-ilyenko/
  slug: 011-graphql-and-sangria-with-oleg-ilyenko
  description: What is GraphQL and when should you use it? Oleg Illyenko is primary creator of Sangria, a graphql implementation used by twitter, The New York Times and many other companies. We discuss
    the problems that graphql solves, how sangria works and the problems of api design. According to Oleg, GraphQL gives you a type system for your API.
  source: corecursive
- type: podcast
  role: host
  title: PureScript
  date: '2018-04-04'
  url: https://corecursive.com/010-purescript-and-avocados-with-justin-woo/
  slug: 010-purescript-and-avocados-with-justin-woo
  description: Purescript is a functional programming language that compiles to JavaScript. It is a strict Haskell dialect that can run anywhere that JavaScript does. Justin Woo is a self described PureScript
    evangelist and enthusiast. We talk about PureScript vs Elm and working with expressive type systems. Justin also had some great metaphors about phantom types and masking tape as well as avocados and
    testing.
  source: corecursive
- type: podcast
  role: host
  title: Throwaway the Irrelevant
  date: '2018-03-21'
  url: https://corecursive.com/009-throw-away-the-irrelevant-with-john-a-de-goes/
  slug: 009-throw-away-the-irrelevant-with-john-a-de-goes
  description: John De Goes and I talk flame wars, monad transformer performance, IO monad flavours, and reasoning about polymorphic type signatures. On the lighter side, we discuss how to write technical
    articles well and Zee vs Zed pronunciation.
  source: corecursive
- type: podcast
  role: host
  title: Generic Programming
  date: '2018-03-07'
  url: https://corecursive.com/008-generic-programming-and-shapeless-with-miles-sabin/
  slug: 008-generic-programming-and-shapeless-with-miles-sabin
  description: When Miles Sabin applied to speak at a conference on generic programming, he bluffed a little bit. He would present on porting Simon Peytons Jone’s scrap your boilerplate functionality to
    Scala. Once his talk was accepted, he only had one thing left to do, implement it. Generic programming is the type of polymorphism your language does not directly support. To me this seems paradoxical,
    as once you implement a solution, the language, or at least a library within the language can now support it. This recursive definition and a speaking deadline led Miles to create shapeless. Years later
    he is still pushing the bounds on what you can do in Scala, including recently getting support for literal types added to scalac 2.13.
  source: corecursive
- type: podcast
  role: host
  title: Total Programming Using Swift
  date: '2018-02-12'
  url: https://corecursive.com/007-total-programming-using-swift-with-andre-videla/
  slug: 007-total-programming-using-swift-with-andre-videla
  description: In simple terms, a total function is a function that produces a well defined output for all possible inputs. A total program is a program composed of only total functions. A non-total, or
    partial function, would be a function that can fail given certain inputs. Such as taking the head of a list, which can fail if giving an empty list and is therefore non-total. Total programming can
    be done in any language, however many languages make this easier. Some, going so far as to require proof of totality. In this interview Andre Videla discusses how the swift program language encourages
    programming in a total style. He also discusses his love of Idris, proof assistants and how his research into haskell, idris and dependant types have made him a better swift programmer.
  source: corecursive
- type: podcast
  role: host
  title: Type Driven Development and Idris
  date: '2018-01-29'
  url: https://corecursive.com/006-type-driven-development-and-idris-with-edwin-brady/
  slug: 006-type-driven-development-and-idris-with-edwin-brady
  description: Edwin Brady is the creator of the Idris programming language and Author of the book Type-Driven Development with Idris and a computer science lecturer. The book, the language and Edwin himself
    all seem to be chock full of ideas for improving the way computer programming is done, by applying ideas from programming language theory. In this interview, we discuss dependent types, type holes,
    interactive and type-driven development, theorem provers, Curry–Howard correspondence, dependant haskell, total functional programming, British vs American spelling and much more.
  source: corecursive
- type: podcast
  role: host
  title: Algebraic Domain Modelling using Functions
  date: '2018-01-22'
  url: https://corecursive.com/005-algebraic-domain-modelling-using-functions-with-debashish-ghosh/
  slug: 005-algebraic-domain-modelling-using-functions-with-debashish-ghosh
  description: In object oriented languages, modeling a complex problem domain is a well understood process. Books like Domain Driven Design contain techniques for breaking down a problem domain and earlier
    books like the gang of four book catalogue design patterns for modeling these domains in an object oriented way. In today’s interview Debashish Ghosh explains how to model a complex problem domain in
    a functional paradigm. His solution focuses on modelling the behaviour of the software system rather than nouns it will contain. He also focuses on an algebraic approach to api design and discusses
    how abstract algebra provides tools for building better software.
  source: corecursive
- type: podcast
  role: host
  title: Design Principles From Functional Programming
  date: '2018-01-10'
  url: https://corecursive.com/004-design-principles-from-functional-programming-with-runar-bjarnason/
  slug: 004-design-principles-from-functional-programming-with-runar-bjarnason
  description: Runar Bjarnason has been exploring how writing in a functional style increases modularity and compositionality of software for many years. He is co-author of functional programming in scala,
    a book that teaches these principles in scala. It is a very challenging yet very rewarding book, sometimes referred to as simple ‘the red book’. In this interview Runar explains how writing in a functional
    style involves limiting side effects, avoiding exceptions and using higher order abstractions. Writing in this style places constraints on what a module in a software system may do, but by constraining
    modules in this way, the software modules themselves become endlessly composable.
  source: corecursive
- type: podcast
  role: host
  title: Scala at Duolingo
  date: '2018-01-07'
  url: https://corecursive.com/003-scala-at-duolingo-with-andre-kenji-horie/
  slug: 003-scala-at-duolingo-with-andre-kenji-horie
  description: Doulingo is a language learning platform with over 200 million users. On a daily basis millions of users receive customized language lessons targeted specifically to them. These lessons are
    generated by a system called the session generator. In this episode, Andre talks about the reasons for the rewrite, what drove them to move to scala and the experience of moving from one technology
    stack to another.
  source: corecursive
- type: podcast
  role: host
  title: Incident Response
  date: '2018-01-05'
  url: https://corecursive.com/002-incident-response-with-emil-stolarsky/
  slug: 002-incident-response-with-emil-stolarsky
  description: As a system becomes more complex, the chance of failure increases. At a large enough scale, failures are inevitable. Incident response is the practice of preparing for and effectively recovering
    from these failures. In this interview Emil argues that we need to move beyond tribal knowledge and incorporate practices such as an incident command system and rigorous use of checklists. Emil suggests
    that we need to move beyond a mindset of - "move fast and break things" and toward a place of more deliberate preparation.
  source: corecursive
- type: podcast
  role: host
  title: Scala Native
  date: '2018-01-01'
  url: https://corecursive.com/001-scala-native-with-denys-shabalin/
  slug: 001-scala-native-with-denys-shabalin
  description: Scala is a functional and object oriented programming language built on the JVM. Scala Native takes this language, loved by many, and brings it to bare metal. Scala Native is an optimizing
    ahead-of-time compiler and lightweight managed runtime designed specifically for Scala. Denys Shabalin is a Research Assistant at the EPFL and the primary creator of Scala Native. In this episode, I
    interview Denys about the motivations behind the Scala Native project, how it was implemented and future directions. He also briefly touches on how Scala Native made cold compilation times of Scala
    code twice as fast. If you are interested in functional programming, compiler design, or want to learn some interesting tidbits about garbage collector design and trade offs you will like this episode.
  source: corecursive
