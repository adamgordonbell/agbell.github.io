# Per-episode editorial overrides for CoRecursive timeline items.
#
# Base data (title, date, url, description, episode_number, duration, with)
# comes from data/corecursive.json — regenerated by scripts/sync-corecursive.py.
# Any field set here OVERRIDES the auto-generated base at render time.
#
# Key by slug (last path segment of the corecursive.com URL).
#
# Common reasons to add an override:
#   description: replace the feed blurb with a sharper one-liner
#   long:        markdown editorial expansion (revealed by `⌄ more`)
#   notable:     true → bubble to homepage / highlights
#   reception:   "HN front page", "Daniel Ek replied", etc.
#   with:        fix guest name when the title parser miss-parsed
#
# Example:
#
# the-aging-programmer:
#   description: Kate Gregory on why the story we tell about aging
#     is worse than the aging itself.
#   notable: true
#   reception: "Picked up by HN"
#   long: |
#     Long-form editorial expansion in markdown.
#     Multi-line is fine.

# Add entries below.
