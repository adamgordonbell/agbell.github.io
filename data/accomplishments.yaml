# Adam Gordon Bell — accomplishments data file
#
# Source of truth. Copied to ~/sandbox/agbell.github.io/data/accomplishments.yaml
# via `just sync-data` (Hugo does not follow symlinks for data/).
#
# Schema:
#   title         (str)   required
#   type          (str)   talk | article | podcast | workshop | media | blog
#   date          (date)  YYYY-MM-DD (use first of month if day unknown)
#   venue         (str)   conference / publication / podcast name
#   location      (str)   optional — for talks
#   url           (str)   canonical link
#   video_url     (str)   optional — direct video link
#   slides_url    (str)   optional — slides / deck link
#   description   (str)   one-line summary (always shown on the card)
#   long          (str)   markdown editorial expansion (revealed by `⌄ more`)
#   format        (str)   "45 min", "60 min", "Workshop", "Long-form", "Hosting", …
#   with          (str)   guest name (podcasts) or co-author / co-speaker
#   reception     (str)   "800+ attendees", "HN front page", quoted feedback, etc.
#   thumbnail     (str)   optional — image path (used by some card variants)
#   notable       (bool)  true = surfaces on homepage / highlights
#   tags          (list)  free-form tags
#   upcoming      (bool)  true = accepted but not yet given (talks)
#
# Convention: `notable` defaults to false. Adam sets true during Phase 3 audit.

# Employment / role eras — render as range overlays on the timeline.
# start_date inclusive; omit end_date for "present".
