  - title: "Understanding AWK"
    type: article
    date: 2021-03-10
    venue: "Earthly Blog"
    url: https://earthly.dev/blog/awk-examples/
    video_url:
    format: "Long-form tutorial"
    reception: "Hacker News front page"
    description: "A comprehensive guide to AWK that became a go-to reference."
    long: |
      AWK has a reputation as a fossil — a thing from the 70s that lurks in
      `.bashrc` files. This piece takes it seriously as a programming language
      and walks through enough of the model — fields, records, patterns,
      associative arrays — that the reader can actually reach for it next time
      they're tempted by Python for a one-liner. Ended up as one of the most-
      shared AWK references on the internet.
    notable: false
    tags: [awk, tutorial, hn-front-page]
    upcoming: false

