  - title: "When AI Agents Meet Production Infrastructure"
    type: talk
    date: 2026-03-07
    venue: "SCaLE 23x"
    location: "Pasadena, CA"
    url: https://www.socallinuxexpo.org/scale/23x/presentations/when-ai-agents-meet-production-infrastructure
    video_url:
    slides_url:
    format: "45 min"
    reception: "800+ attendees · Open Source AI track"
    description: "Failure modes when AI agents touch real infrastructure — and the reliability patterns that keep them safe."
    long: |
      The agent industry has spent two years building autonomy and one year
      patching the surprises that came with it. This talk takes the audience
      through three production-grade failure modes — runaway tool loops,
      blast-radius miscalibration, and trust-boundary drift — and walks through
      the structural fixes (policy-as-code, IaC review gates, tighter scopes)
      that actually hold up. Built from real systems, not demos.
    notable: false
    tags: [ai, agents, infrastructure]
    upcoming: false

