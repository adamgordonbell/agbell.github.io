  - title: "Build Your Own Container Runtime with chroot"
    type: talk
    date: 2023-03-09
    venue: "SCaLE 20x"
    location: "Pasadena, CA"
    url: https://www.socallinuxexpo.org/scale/20x
    video_url: https://www.youtube.com/watch?v=89ESCBzM-3Q
    slides_url:
    format: "45 min"
    description: "Walking through how Linux namespaces and cgroups enable containerization, by building a runtime from scratch."
    long: |
      Containers feel magical until you build one. This talk strips the magic
      off the magic — `chroot`, `unshare`, `cgroups`, layered filesystems — and
      reconstructs a tiny runtime live, so the audience leaves with a mental
      model of what Docker is actually doing under the hood.
    notable: false
    tags: [containers, linux]
    upcoming: false

