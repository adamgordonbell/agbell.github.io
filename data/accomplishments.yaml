  - title: "INTERCAL, YAML, And Other Horrible Programming Languages"
    type: article
    date: 2021-09-01
    venue: "Earthly Blog"
    url: https://earthly.dev/blog/intercal-yaml-and-other-horrible-programming-languages/
    video_url:
    format: "Essay"
    reception: "Hacker News front page · sparked industry debate"
    description: "Viral piece arguing YAML-as-DSL is the new INTERCAL."
    long: |
      The argument: if you have conditionals, loops, and references, you have
      a programming language — and YAML is a hostile one. The piece used
      INTERCAL as a foil to make the case that configuration formats are
      becoming programming languages by accident, and badly. It hit the HN
      front page, got picked up across the industry, and started an actual
      conversation about why we keep choosing YAML for things that need real
      logic. Pulumi's existence is part of the answer.
    notable: false
    tags: [yaml, opinion, hn-front-page]
    upcoming: false

